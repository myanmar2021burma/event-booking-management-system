<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EVENT</title>
    <link rel="stylesheet" href="resources/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card register-card">
            <div class="auth-header">
                <h1>🎫 EVENT</h1>
                <p>Create your account to start booking events</p>
            </div>
            
            <form id="register-form" class="auth-form active">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" required placeholder="Choose a username">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required placeholder="your@email.com">
                        <small id="emailError" style="color:blue;"></small>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="full-name">Full Name *</label>
                    <input type="text" id="full-name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="Your phone number (optional)">
</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" required placeholder="At least 6 characters">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password *</label>
                        <input type="password" id="confirm-password" required placeholder="Re-enter password">
                    </div>
                </div>
                
                <div class="password-strength" id="password-strength"></div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="resources/js/auth.js"></script>
</body>
</html>
