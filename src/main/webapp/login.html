<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EVENT</title>
    <link rel="stylesheet" href="resources/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎫 EVENT</h1>
                <p>Welcome back! Please login to your account</p>
            </div>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="showTab('user')">User Login</button>
                <button class="tab-btn" onclick="showTab('admin')">Admin Login</button>
            </div>
            
            <!-- User Login Form -->
            <form id="user-login-form" class="auth-form active">
                <div class="form-group">
                    <label for="user-username">Username</label>
                    <input type="text" id="user-username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="user-password">Password</label>
                    <input type="password" id="user-password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary">Login</button>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>
            
            <!-- Admin Login Form -->
            <form id="admin-login-form" class="auth-form">
                <div class="form-group">
                    <label for="admin-username">Admin Username</label>
                    <input type="text" id="admin-username" required placeholder="Enter admin username">
                </div>
                
                <div class="form-group">
                    <label for="admin-password">Admin Password</label>
                    <input type="password" id="admin-password" required placeholder="Enter admin password">
                </div>
                
                <button type="submit" class="btn btn-primary">Admin Login</button>
              
            </form>
        </div>
    </div>
    
    <script src="resources/js/auth.js"></script>
</body>
</html>
